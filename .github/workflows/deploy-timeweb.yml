name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to Timeweb via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/biznes-ip.ru/public_html/' }}
          dangerous-clean-slate: false

  deploy-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Память10
        uses: actions/checkout@v4
        with:
          repository: thesuperfatal/pamyat10
          path: memory

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: memory/package-lock.json

      - name: Install dependencies
        working-directory: memory
        run: npm ci

      - name: Build Память10 under /memory
        working-directory: memory
        env:
          NEXT_PUBLIC_BASE_PATH: /memory
        run: npm run build

      - name: Deploy Память10 to /memory/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./memory/out/
          server-dir: /biznes-ip.ru/public_html/memory/
          dangerous-clean-slate: false

  deploy-sad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Грядка10
        uses: actions/checkout@v4
        with:
          repository: thesuperfatal/griadka10
          path: sad

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sad/package-lock.json

      - name: Install dependencies
        working-directory: sad
        run: npm ci

      - name: Build Грядка10 under /sad
        working-directory: sad
        env:
          NEXT_PUBLIC_BASE_PATH: /sad
        run: npm run build

      - name: Deploy Грядка10 to /sad/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./sad/out/
          server-dir: /biznes-ip.ru/public_html/sad/
          dangerous-clean-slate: false
